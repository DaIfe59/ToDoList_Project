services:
  db:
    image: postgres:13
    container_name: todo_db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5


  app:
    build:
      context: ./TODOListServer

    container_name: todo_app

    ports:
      - "5000:8080"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/categories/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_CONNECTION: ${DB_CONNECTION}

    restart: unless-stopped