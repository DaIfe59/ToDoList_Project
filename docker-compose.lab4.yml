services:
  app1:
    build:
      context: ./lab4/app
    environment:
      NODE_NAME: "Нода 1"

  app2:
    build:
      context: ./lab4/app
    environment:
      NODE_NAME: "Нода 2"

  app3:
    build:
      context: ./lab4/app
    environment:
      NODE_NAME: "Нода 3"

  nginx-lb:
    image: nginx:1.27-alpine
    depends_on:
      - app1
      - app2
      - app3
    volumes:
      - ./lab4/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
