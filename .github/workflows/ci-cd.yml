name: CI/CD

on:
  push:
    

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore ./TODOListServer/TODOListServer.csproj

      - name: Build
        run: dotnet build ./TODOListServer/TODOListServer.csproj --no-restore

      - name: Run tests
        run: dotnet test


   build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/todolist-app ./TODOListServer

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/todolist-app